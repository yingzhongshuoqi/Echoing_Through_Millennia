services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: echobot_relics
      POSTGRES_USER: echobot
      POSTGRES_PASSWORD: echobot_dev
    ports:
      # 复用 .env 里的本地端口配置，避免容器映射端口与应用连接串不一致。
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echobot -d echobot_relics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
